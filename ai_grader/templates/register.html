<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên | AI-Grader Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px 0;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 35px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: #0d47a1;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(13, 71, 161, 0.3);
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #dee2e6;
            margin-bottom: 15px;
        }

        .btn-register {
            background: #0d47a1;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background: #1565c0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-link {
            color: #0d47a1;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="register-card shadow">
    <div class="brand-logo">
        <i class="fas fa-user-plus"></i>
    </div>
    <h3 class="text-center fw-bold mb-1">Tạo tài khoản mới</h3>
    <p class="text-muted text-center mb-4 small">Bắt đầu hành trình học tập cùng AI</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <div class="mb-2">
            <label class="form-label">MÃ SINH VIÊN (MSV)</label>
            <input type="text" name="student_id" class="form-control" placeholder="Nhập mã định danh duy nhất" required>
        </div>

        <div class="mb-2">
            <label class="form-label">HỌ VÀ TÊN</label>
            <input type="text" name="full_name" class="form-control" placeholder="Nhập tên đầy đủ của bạn">
        </div>
        
        <div class="mb-3">
            <label class="form-label">MẬT KHẨU</label>
            <input type="password" name="password" class="form-control" placeholder="Tạo mật khẩu bảo mật" required>
        </div>

        <button type="submit" class="btn btn-register mb-3">
            ĐĂNG KÝ THÀNH VIÊN
        </button>
    </form>

    <div class="text-center mt-2">
        <span class="text-muted small">Đã có tài khoản?</span> 
        <a href="/login" class="login-link small">Đăng nhập ngay</a>
    </div>
</div>

</body>
</html>
