<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | AI-Grader Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Gradient chuyên nghiệp, nhìn là thấy đắt tiền ngay */
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: #0d47a1;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 35px;
            box-shadow: 0 5px 15px rgba(13, 71, 161, 0.4);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            margin-bottom: 20px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
            border-color: #0d6efd;
        }

        .btn-login {
            background: #0d47a1;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            color: white;
            width: 100%;
        }

        .btn-login:hover {
            background: #1565c0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .register-link {
            color: #0d47a1;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="fas fa-robot"></i>
    </div>
    <h3 class="text-center fw-bold mb-2">Chào mừng trở lại</h3>
    <p class="text-muted text-center mb-4">Vui lòng đăng nhập để tiếp tục</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-danger py-2 small text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">MÃ SINH VIÊN</label>
            <input type="text" name="student_id" class="form-control" placeholder="Nhập mã định danh của bạn" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold text-muted">MẬT KHẨU</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-login mb-3">
            ĐĂNG NHẬP HỆ THỐNG
        </button>
    </form>

    <div class="text-center mt-3">
        <span class="text-muted small">Chưa có tài khoản?</span> 
        <a href="/register" class="register-link small">Đăng ký ngay</a>
    </div>
</div>

</body>
</html>
