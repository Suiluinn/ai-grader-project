{% extends 'base.html' %}

{% block content %}
<style>
    /* CSS chuẩn SaaS Admin Dashboard */
    .admin-sidebar {
        background: #ffffff;
        border-radius: 12px;
        padding: 20px 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        /* 2 dòng dưới đây giúp Sidebar đóng đinh một chỗ khi cuộn trang */
        position: sticky;
        top: 20px;
    }
    .admin-nav-link {
        color: #4b5563;
        font-weight: 600;
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 8px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
    }
    .admin-nav-link:hover {
        background-color: #f3f4f6;
        color: #111827;
    }
    /* Giao diện nút đang được chọn (Active) */
    .admin-nav-link.active {
        background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        color: #ffffff;
        box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
    }
    /* CSS cho khung nội dung bên phải */
    .admin-content-card {
        background: #ffffff;
        border-radius: 12px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        padding: 30px;
        min-height: 80vh; /* Đảm bảo khung bên phải luôn đủ độ dài hiển thị */
    }
</style>

<div class="container-fluid py-4">
    <div class="row g-4 mb-5">
        
        <div class="col-lg-3">
            <div class="admin-sidebar">
                
                <div class="text-center mb-4 pb-3 border-bottom">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 60px; height: 60px; font-size: 1.5rem;">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h6 class="fw-bold text-dark mb-0">Admin Panel</h6>
                    <small class="text-muted">Quản trị nội dung</small>
                </div>
                
                <div class="nav flex-column nav-pills">
                    
                    <a href="/teacher" class="admin-nav-link {% if request.path == '/teacher' and request.args.get('tab') != 'add' %}active{% endif %}">
                        <i class="fas fa-list-ul"></i> Ngân Hàng Đề Thi
                    </a>
                    
                    <a href="/teacher?tab=add" class="admin-nav-link {% if request.args.get('tab') == 'add' %}active{% endif %}">
                        <i class="fas fa-plus-circle"></i> Thêm Đề Mới
                    </a>

                    <a href="/teacher/bulk_grade" class="admin-nav-link {% if request.path == '/teacher/bulk_grade' %}active{% endif %}">
                        <i class="fas fa-file-archive"></i> Chấm Hàng Loạt (ZIP)
                    </a>
                    
                    <a href="/teacher/dashboard" class="admin-nav-link {% if request.path == '/teacher/dashboard' %}active{% endif %}">
                        <i class="fas fa-chart-line"></i> Bảng Điểm Lớp
                    </a>
                    
                    <a href="/teacher/students" class="admin-nav-link {% if request.path == '/teacher/students' %}active{% endif %}">
                        <i class="fas fa-users-cog"></i> Quản Lý Sinh Viên
                    </a>
                </div>

            </div>
        </div>

        <div class="col-lg-9">
            {% block admin_content %}{% endblock %}
        </div>

    </div>
</div>
{% endblock %}
